<header class="header">
	<div class="header__container _container">
		<div class="header__body">
			<a class="header__logo" href="#">
				<img src="@img/logo.svg" alt="logo" />
			</a>
			<div class="header__right">
				<nav class="header__menu menu">
					<ul class="menu__list">
						<li class="menu__item"><a class="menu__link" href="#">Main</a></li>
						<li class="menu__item"><a class="menu__link" href="#">About Us</a></li>
						<li class="menu__item"><a class="menu__link" href="#">Portfolio</a></li>
						<li class="menu__item"><a class="menu__link" href="#">Contacts</a></li>
					</ul>
				</nav>
				<button class="header__burger icon-menu">
					<svg class="open" xmlns="http://www.w3.org/2000/svg" width="59" height="58" viewBox="0 0 59 58" fill="none">
						<circle cx="29.3104" cy="28.8581" r="28.6081" stroke="#D5D5D5" stroke-width="0.5"/>
						<rect x="16.8139" y="27.8828" width="25" height="2" fill="white"/>
						<rect x="29.3704" y="21.8071" width="12.4168" height="2" fill="white"/>
						<rect x="16.8069" y="33.9092" width="12.4168" height="2" fill="white"/>
					</svg>
					<svg class="close" xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40" fill="none">
						<circle cx="20" cy="20" r="19.75" stroke="#D5D5D5" stroke-width="0.5"/>
						<rect x="14" y="26" width="17" height="1" transform="rotate(-45 14 26)" fill="white"/>
						<rect x="14.7072" y="13.979" width="17" height="1" transform="rotate(45 14.7072 13.979)" fill="white"/>
					</svg>
				</button>
			</div>
		</div>
	</div>
</header>
